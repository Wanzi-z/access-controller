# Device Manager punch endpoint and authenticated dashboard — open-automation.org
# Public: device punch-in and health. Authenticated: Device Manager UI/API.

server {
    server_name open-automation.org;

    # -- Allowed without auth: device punch-in (ESP32 / IoT self-registration) --
    location = /api/devices/punch {
        limit_except POST {
            deny all;
        }

        proxy_pass http://127.0.0.1:3035;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # -- Compatibility URL used by deployed firmware. POST stays public for punch-in.
    #    Browser GET/HEAD/etc require auth and render the Device Manager SPA.
    location = /devices {
        limit_except POST {
            auth_basic "Device Manager";
            auth_basic_user_file /etc/nginx/open-automation-device-manager.htpasswd;
        }

        proxy_pass http://127.0.0.1:3035;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # -- Allowed without auth: health check --
    location = /api/health {
        proxy_pass http://127.0.0.1:3035;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # -- Authenticated Device Manager SPA routes and static bundle --
    location /devices/ {
        auth_basic "Device Manager";
        auth_basic_user_file /etc/nginx/open-automation-device-manager.htpasswd;

        proxy_pass http://127.0.0.1:3035;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /assets/ {
        auth_basic "Device Manager";
        auth_basic_user_file /etc/nginx/open-automation-device-manager.htpasswd;

        proxy_pass http://127.0.0.1:3035;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # -- Authenticated Device Manager APIs. This includes access-controller state,
    #    safe firmware API proxy, OTA upload, Wi-Fi config, and control actions.
    location /api/ {
        auth_basic "Device Manager";
        auth_basic_user_file /etc/nginx/open-automation-device-manager.htpasswd;

        client_max_body_size 8m;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:3035;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # -- Block everything else --
    location / {
        return 403;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/open-automation.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/open-automation.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = open-automation.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name open-automation.org;
    listen 80;
    return 404; # managed by Certbot
}
